<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWED OG Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }

        .og-card {
            width: 1200px;
            height: 630px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid pattern */
        .og-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .brand-name {
            font-size: 72px;
            font-weight: 800;
            color: #0a0a0a;
            letter-spacing: -2px;
            margin-bottom: 16px;
        }

        .tagline {
            font-size: 32px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
        }

        .description {
            font-size: 22px;
            color: #666;
            max-width: 800px;
            line-height: 1.5;
        }

        .url {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 18px;
            color: #888;
            font-weight: 500;
        }

        .badge {
            position: absolute;
            top: 40px;
            right: 60px;
            background: #00C853;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="og-card">
        <div class="badge">Open Source</div>

        <div class="content">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4zm-1 15l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z" />
                </svg>
            </div>

            <h1 class="brand-name">QWED</h1>
            <p class="tagline">Deterministic Verification for AI</p>
            <p class="description">Mathematically prove LLM outputs before they reach production</p>
        </div>

        <span class="url">docs.qwedai.com</span>
    </div>
</body>

</html>
